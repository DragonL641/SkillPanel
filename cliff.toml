# git-cliff configuration
[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]{% if date %} - {{ date | date(format="%Y-%m-%d") }}{% endif %}

{% else %}\
## [Unreleased]

{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
{% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ commit.remote.pr_url }})){% endif %}

{% endfor %}
{% endfor %}\n
"""

trim = true

[git]
conventional_commits = true
filter_commits = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Performance" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
]
protect_breaking_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/DragonL641/SkillPanel/issues/" },
]

[remote]
github = { owner = "DragonL641", repo = "SkillPanel" }
